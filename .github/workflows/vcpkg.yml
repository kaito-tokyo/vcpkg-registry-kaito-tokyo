name: Vcpkg CI

# file: .github/workflows/vcpkg-ort.yml
# author: Kaito Udagawa <umireon@kaito.tokyo>
# version: 1.0.0
# date: 2026-04-2

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions: {}

env:
  VCPKG_VERSION: '2026.04.27'

jobs:
  build-mlx:
    runs-on: macos-26
    timeout-minutes: 60

    permissions:
      contents: read

    env:
      DEVELOPER_DIR: '/Applications/Xcode_26.4.1.app'

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Print CMake version
        shell: bash --noprofile --norc -euo pipefail -O nullglob {0}
        run: |
          cmake --version

      - name: Print Ninja version on Ubuntu
        shell: bash --noprofile --norc -euo pipefail -O nullglob {0}
        run: |
          ninja --version

      - name: Checkout vcpkg
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: microsoft/vcpkg
          ref: ${{ env.VCPKG_VERSION }}
          persist-credentials: false
          path: vcpkg
          filter: blob:none

      - name: Set up vcpkg using Bash
        shell: bash --noprofile --norc -euo pipefail -O nullglob {0}
        run: |
          ./vcpkg/bootstrap-vcpkg.sh -disableMetrics

      - name: Install vcpkg package
        shell: bash --noprofile --norc -euo pipefail -O nullglob {0}
        env:
          VCPKG_ROOT: '${{ github.workspace }}/vcpkg'
        run: |
          ./vcpkg/vcpkg install --overlay-ports=ports mlx

      - if: always()
        run: |
          cat /Users/runner/work/vcpkg-registry-kaito-tokyo/vcpkg-registry-kaito-tokyo/vcpkg/buildtrees/detect_compiler/config-arm64-osx-rel-out.log
          cat /Users/runner/work/vcpkg-registry-kaito-tokyo/vcpkg-registry-kaito-tokyo/vcpkg/buildtrees/detect_compiler/config-arm64-osx-rel-err.log
